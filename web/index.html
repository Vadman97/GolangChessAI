<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" type="text/css" href="css/vendor/chessboard-0.3.0.min.css" />
  <link rel="stylesheet" type="text/css" href="css/main.css" />
</head>

<body>
  <div class="banner">
    <h1 class="title">Vadbot 3.0 - Chess AI</h1>
    <span class="subtitle">Devan Adhia, Vadim Korolik, Alex Lee, Suveena Thanawala</span>
  </div>
  <div class="content">
    <div class="game-error"></div>
    <div id="tournament-info" style="display:none;text-align:center;padding:8px 0;font-size:1.1em;font-weight:bold;"></div>
    <div class="game">
      <div class="board-content">
        <div id="board"></div>
        <button id="start-btn">Start</button>
      </div>
      <div class="game-status">
        <h3 class="status-title">Game Information</h3>
        <div class="status-content">
          <div class="column">
            <div class="status">
              <strong>Status: </strong>
              <span>?</span>
            </div>
            <div class="current-turn">
              <strong>Current Turn: </strong>
              <span>?</span>
            </div>
          </div>
          <div class="column">
            <div class="moves-played">
              <strong>Moves Played: </strong>
              <span>?</span>
            </div>
            <div class="move-limit">
              <strong>Move Limit: </strong>
              <span>?</span>
            </div>
          </div>
        </div>
        <div class="ai-thinking"></div>
        <h3 class="status-alert">Check!</h3>
        <button id="concede-btn" class="light">Concede</button>
      </div>
    </div>
  </div>
  <div id="tournament-results" style="display:none;width:560px;margin:0 auto 40px;font-family:inherit;">
    <h2 id="tournament-results-title" style="text-align:center;font-weight:bold;letter-spacing:1px;margin-bottom:12px;">Tournament Complete — Final Standings</h2>
    <table id="tournament-results-table" style="width:100%;border-collapse:collapse;font-size:0.95em;">
      <thead>
        <tr style="background:#0668fe;color:#fff;">
          <th style="padding:8px 10px;text-align:left;">Rank</th>
          <th style="padding:8px 10px;text-align:left;">Algorithm</th>
          <th style="padding:8px 10px;text-align:right;">Elo</th>
          <th style="padding:8px 10px;text-align:right;">W</th>
          <th style="padding:8px 10px;text-align:right;">D</th>
          <th style="padding:8px 10px;text-align:right;">L</th>
          <th style="padding:8px 10px;text-align:right;">Score%</th>
        </tr>
      </thead>
      <tbody id="tournament-results-body"></tbody>
    </table>
  </div>
  <div class="popper pawn-promotion">
    <div class="white-promotion">
      <img class="promotion-piece" data-piece="wN" src="img/chesspieces/wikipedia-svg/wN.svg"/>
      <!-- <img class="promotion-piece" data-piece="wB" src="img/chesspieces/wikipedia-svg/wB.svg"/>
      <img class="promotion-piece" data-piece="wR" src="img/chesspieces/wikipedia-svg/wR.svg"/> -->
      <img class="promotion-piece" data-piece="wQ" src="img/chesspieces/wikipedia-svg/wQ.svg"/>
    </div>
    <div class="black-promotion">
      <img class="promotion-piece" data-piece="bN" src="img/chesspieces/wikipedia-svg/bN.svg"/>
      <!-- <img class="promotion-piece" data-piece="bB" src="img/chesspieces/wikipedia-svg/bB.svg"/>
      <img class="promotion-piece" data-piece="bR" src="img/chesspieces/wikipedia-svg/bR.svg"/> -->
      <img class="promotion-piece" data-piece="bQ" src="img/chesspieces/wikipedia-svg/bQ.svg"/>
    </div>
    <div class="popper__arrow" x-arrow></div>
  </div>
</body>
<script type="text/javascript" src="dist/main.js"></script>
<script type="text/javascript" src="dist/vendors.js"></script>
</html>
